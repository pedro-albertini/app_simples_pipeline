services:

  db:
    image: postgres:15-alpine
    container_name: pedro_albertini
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - pedro_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: pedro_api
    restart: always 
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "3029:3000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 100s  

    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Cada arquivo de log terá no máximo 10MB
        max-file: "3"     # O Docker guarda apenas os últimos 3 arquivos (total 30MB)   

  web:
    build: ./frontend
    container_name: pedro_web
    ports:
      - "8029:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pedro_data: